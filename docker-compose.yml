version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ioc-learning-app
    environment:
      POSTGRES_DB: learningapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - learning_app_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  learning_app_postgres_data:
    driver: local